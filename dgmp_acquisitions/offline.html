<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGMP - Hors ligne</title>
    <link rel="icon" href="https://dgmp-acquisitions.up.railway.app/logo_dgmp.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a237e, #283593);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #ffd600;
        }
        p {
            font-size: 16px;
            opacity: 0.85;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: #ffd600;
            color: #1a237e;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #ffca28;
        }
        .status {
            margin-top: 24px;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏛️</div>
        <div class="icon">📡</div>
        <h1>Pas de connexion</h1>
        <p>
            Vous êtes actuellement <strong>hors ligne</strong>.<br>
            Vérifiez votre connexion internet et réessayez.
        </p>
        <p>
            <strong>DGMP</strong><br>
            Système d'Acquisitions Informatiques
        </p>

        <button class="btn" onclick="window.location.reload()">
            🔄 Réessayer
        </button>

        <div class="status">
            <p>
                💡 Certaines fonctionnalités sont disponibles
                sans connexion grâce au cache.
            </p>
        </div>
    </div>

    <script>
        // Réessayer automatiquement quand la connexion revient
        window.addEventListener('online', function() {
            window.location.reload();
        });

        // Vérifier la connexion toutes les 5 secondes
        setInterval(function() {
            if (navigator.onLine) {
                window.location.reload();
            }
        }, 5000);
    </script>
</body>
</html>
